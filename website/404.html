  <script>
    // GitHub Pages: rutas profundas → redirigir a la raíz del sitio
    (function () {
      var base = location.pathname.replace(/\/[^/]*$/, '/');
      if (base.indexOf('/sim') !== -1) {
        location.replace(base.replace(/\/sim.*/, '/sim/'));
      } else {
        location.replace(base || './');
      }
    })();
  </script>

</head>
